<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apps</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 24px;
    }
    h1 { font-size: 22px; color: #fff; font-weight: 700; margin-bottom: 6px; }
    p { font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 48px; }
    .apps { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .app-card {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      padding: 32px 36px; border-radius: 20px; text-decoration: none;
      font-size: 15px; font-weight: 700; min-width: 160px;
      transition: transform .15s, box-shadow .15s;
    }
    .app-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); }
    .app-card .icon { font-size: 40px; }
    .card-map { background: #e94560; color: #fff; }
    .card-bahasa { background: #fff; color: #1a1a2e; }
    .card-realtime { background: #1e1e3a; color: #a0a8ff; border: 2px solid #5566ff44; }
  </style>
</head>
<body>
  <h1>📱 My Apps</h1>
  <p>アプリを選択してください</p>
  <div class="apps">
    <a class="app-card card-map" href="photomap/">
      <span class="icon">🗺️</span>
      Photo Map
    </a>
    <a class="app-card card-bahasa" href="bahasa/">
      <span class="icon">🇮🇩</span>
      Bahasa<br>日常会話
    </a>
    <a class="app-card card-realtime" href="realtime/">
      <span class="icon">🎙️</span>
      同時通訳<br>バハサ→日本語
    </a>
  </div>
</body>
</html>
